<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DAX — Neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  .swatches { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; }
  .sw { border-radius: var(--radius-md); aspect-ratio: 1 / 1.2; padding: 10px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--border); overflow: hidden; }
  .sw .name { font-family: var(--font-sans); font-size: 11px; font-weight: 600; }
  .sw .hex  { font-family: var(--font-mono); font-size: 10px; opacity: 0.7; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Neutrals · light-first</p>
  <div class="swatches">
    <div class="sw" style="background: var(--neutral-000); color: var(--fg-1);"><span class="name">000</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background: var(--neutral-050); color: var(--fg-1);"><span class="name">050</span><span class="hex">#FAFBFC</span></div>
    <div class="sw" style="background: var(--neutral-100); color: var(--fg-1);"><span class="name">100</span><span class="hex">#F2F4F7</span></div>
    <div class="sw" style="background: var(--neutral-200); color: var(--fg-1);"><span class="name">200</span><span class="hex">#E6EAF0</span></div>
    <div class="sw" style="background: var(--neutral-300); color: var(--fg-1);"><span class="name">300</span><span class="hex">#CBD2DD</span></div>
    <div class="sw" style="background: var(--neutral-400); color: #fff;"><span class="name">400</span><span class="hex">#97A1B2</span></div>
    <div class="sw" style="background: var(--neutral-500); color: #fff;"><span class="name">500</span><span class="hex">#5E6A7E</span></div>
    <div class="sw" style="background: var(--neutral-600); color: #fff;"><span class="name">600</span><span class="hex">#3D485B</span></div>
  </div>
</div>
</body>
</html>
