<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DAX — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="_card.css" />
<style>
  body { background: var(--bg-subtle); }
  .card { background: transparent; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 92px; height: 70px; background: var(--bg); border-radius: var(--radius-md); border: 1px solid var(--border); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <p class="eyebrow">Shadow · soft, navy-tinted</p>
  <div class="grid">
    <div class="item"><div class="box" style="box-shadow: var(--shadow-xs);"></div><span class="lbl">xs</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-sm);"></div><span class="lbl">sm · cards</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-md);"></div><span class="lbl">md · menus</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-lg);"></div><span class="lbl">lg · modals</span></div>
    <div class="item"><div class="box" style="box-shadow: var(--shadow-focus); border-color: var(--dax-blue);"></div><span class="lbl">focus ring</span></div>
  </div>
</div>
</body>
</html>
